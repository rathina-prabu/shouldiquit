<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,700;9..144,900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#ece5d8;--ink:#1a1a1a;--rust:#b54324}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);display:flex;justify-content:center;min-height:100vh}
  .page{width:100%;max-width:460px;padding:30px 26px}
  .masthead{border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:36px;display:flex;justify-content:space-between;align-items:baseline;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:500}
  .masthead .title{font-family:'Fraunces';font-size:22px;font-weight:900;letter-spacing:-0.5px;text-transform:none}
  .kicker{color:var(--rust);font-size:11px;text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:10px}
  .question{font-family:'Fraunces';font-weight:300;font-variation-settings:'opsz' 144;font-size:46px;line-height:1.02;letter-spacing:-1.8px;margin:0 0 22px}
  .question .em{font-style:italic;font-weight:700}
  .standfirst{font-family:'Fraunces';font-style:italic;font-weight:400;font-size:18px;line-height:1.45;color:#444;padding-left:14px;border-left:3px solid var(--rust);margin-bottom:40px}
  .options-label{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--rust);font-weight:700;margin-bottom:14px}
  .options{display:flex;flex-direction:column;border-top:1px solid var(--ink)}
  .option{background:transparent;border:0;border-bottom:1px solid var(--ink);padding:18px 0;font:inherit;font-size:16px;text-align:left;display:flex;align-items:center;gap:18px;color:var(--ink);cursor:pointer;transition:all .2s;width:100%}
  .option:hover{padding-left:14px;color:var(--rust)}
  .option:hover .opt-num{color:var(--ink)}
  .opt-num{font-family:'Fraunces';font-size:30px;font-weight:300;color:var(--rust);width:36px;flex-shrink:0;transition:color .2s}
  .opt-text{flex:1}
  .opt-emoji{font-size:22px}
  .footer{margin-top:48px;border-top:2px solid var(--ink);padding-top:12px;display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#666;font-weight:500}
</style>
</head>
<body>
  <div class="page">
    <div class="masthead">
      <span>Vol. I · No. 15</span>
      <span class="title">Dr. K</span>
      <span>16 May '26</span>
    </div>
    <div class="kicker">Section V — The State of You</div>
    <h1 class="question">Let's talk about <span class="em">Sundays.</span></h1>
    <p class="standfirst">"How does your body feel when you remember it's Monday tomorrow?"</p>
    <div class="options-label">Select one</div>
    <div class="options">
      <button class="option"><span class="opt-num">01</span><span class="opt-emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
      <button class="option"><span class="opt-num">02</span><span class="opt-emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
      <button class="option"><span class="opt-num">03</span><span class="opt-emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="opt-num">04</span><span class="opt-emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="footer">
      <span>Confidential</span>
      <span>P. 15 / 20</span>
    </div>
  </div>
</body>
</html>
