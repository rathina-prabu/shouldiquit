<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Boarding Pass</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Space Mono',monospace;background:#1a3a4a;background-image:linear-gradient(135deg,#1a3a4a 0%,#0a1a25 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;color:#1a1a1a}
  .ticket{width:100%;max-width:420px;background:#fdf6e3;display:flex;flex-direction:column;position:relative;box-shadow:0 16px 48px rgba(0,0,0,0.4)}
  .top{padding:18px 22px;border-bottom:2px dashed #1a1a1a;display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1}
  .logo-sub{font-size:9px;letter-spacing:2px;margin-top:2px}
  .ticket-no{font-size:11px;text-align:right;line-height:1.4}
  .ticket-no .num{font-weight:700;font-size:13px}
  .route{padding:22px 22px 8px;display:flex;align-items:center;gap:20px}
  .route-end{flex:1}
  .from-label,.to-label{font-size:9px;letter-spacing:2px;margin-bottom:6px;color:#555}
  .from,.to{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:0.95}
  .plane{font-size:24px;margin-bottom:4px}
  .question-zone{padding:12px 22px 18px}
  .sec-line{font-size:9px;letter-spacing:2px;color:#555;margin-bottom:6px}
  .question{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;line-height:1.25;margin:0 0 6px;text-transform:uppercase}
  .followup{font-size:13px;line-height:1.45;color:#444}
  .info-grid{padding:14px 22px;border-top:1px dashed #1a1a1a;border-bottom:1px dashed #1a1a1a;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .info-cell{font-size:10px}
  .info-label{letter-spacing:2px;margin-bottom:3px;color:#555}
  .info-val{font-family:'Bebas Neue',sans-serif;font-size:18px}
  .options{padding:14px 22px;display:flex;flex-direction:column;gap:6px}
  .option{background:transparent;border:1.5px solid #1a1a1a;padding:10px 14px;font:inherit;font-size:12px;font-weight:700;text-align:left;display:flex;align-items:center;gap:12px;cursor:pointer;color:#1a1a1a;text-transform:uppercase;letter-spacing:0.5px;transition:all .12s}
  .option:hover{background:#1a1a1a;color:#fdf6e3}
  .emoji{font-size:16px}
  .opt-text{flex:1}
  .stub{padding:14px 22px;background:#1a3a4a;color:#fdf6e3;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:2px}
</style>
</head>
<body>
  <div class="ticket">
    <div class="top">
      <div>
        <div class="logo">DR. K AIRLINES</div>
        <div class="logo-sub">CAREER TRANSIT AUTHORITY</div>
      </div>
      <div class="ticket-no">BOARDING PASS<br>NO. <span class="num">SQ-15</span></div>
    </div>
    <div class="route">
      <div class="route-end">
        <div class="from-label">CURRENT</div>
        <div class="from">JOB</div>
      </div>
      <div class="plane">✈</div>
      <div class="route-end" style="text-align:right">
        <div class="to-label">VERDICT</div>
        <div class="to">TBD</div>
      </div>
    </div>
    <div class="question-zone">
      <div class="sec-line">SECTION 05 · ITEM 15</div>
      <h1 class="question">Let's talk about Sundays.</h1>
      <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">PATIENT</div><div class="info-val">USR_XK29Q</div></div>
      <div class="info-cell"><div class="info-label">DATE</div><div class="info-val">16 MAY 26</div></div>
      <div class="info-cell"><div class="info-label">GATE</div><div class="info-val">15 / 20</div></div>
    </div>
    <div class="options">
      <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about calendar</span></button>
      <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, just Monday</span></button>
      <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="stub">
      <span>SEC 5 · STATE OF YOU</span>
      <span>15/20</span>
    </div>
  </div>
</body>
</html>
