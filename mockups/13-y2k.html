<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Y2K</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Quicksand',sans-serif;background:linear-gradient(180deg,#7fc4e8 0%,#a8e6cf 100%);min-height:100vh;display:flex;justify-content:center;padding:20px;color:#003366}
  .panel{width:100%;max-width:420px;background:linear-gradient(180deg,rgba(255,255,255,0.88) 0%,rgba(220,240,255,0.7) 100%);border-radius:20px;padding:24px 22px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,80,140,0.25),inset 0 1px 0 rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.6);display:flex;flex-direction:column}
  .header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid rgba(0,80,140,0.15);margin-bottom:22px}
  .orb{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#3498db 50%,#1a4a7a);box-shadow:0 2px 8px rgba(0,80,140,0.4),inset 0 -3px 6px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Orbitron',sans-serif;font-weight:900}
  .name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px}
  .status{font-size:11px;color:#0066aa;display:flex;align-items:center;gap:5px;margin-top:1px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#00ff88,#00aa44);box-shadow:0 0 6px #00ff88}
  .section{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:#0066aa;text-transform:uppercase;font-weight:500;margin-bottom:10px}
  .question{font-family:'Quicksand',sans-serif;font-weight:700;font-size:28px;line-height:1.1;color:#003366;margin:0 0 10px;letter-spacing:-0.5px}
  .followup{font-size:15px;line-height:1.4;color:#1a4a7a;margin-bottom:24px;font-weight:500}
  .options{display:flex;flex-direction:column;gap:10px}
  .option{background:linear-gradient(180deg,rgba(255,255,255,0.95) 0%,rgba(220,240,255,0.7) 100%);border:1px solid rgba(0,80,140,0.2);border-radius:14px;padding:13px 16px;font:inherit;font-weight:500;font-size:14px;color:#003366;text-align:left;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 2px 6px rgba(0,80,140,0.12),inset 0 1px 0 rgba(255,255,255,0.95);transition:all .15s}
  .option:hover{background:linear-gradient(180deg,#fff 0%,#cbe6ff 100%);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,80,140,0.22),inset 0 1px 0 rgba(255,255,255,1)}
  .emoji{font-size:20px}
  .opt-text{flex:1}
  .progress-wrap{margin-top:18px;padding-top:16px;border-top:1px solid rgba(0,80,140,0.15)}
  .progress-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#0066aa;text-transform:uppercase;letter-spacing:2px}
  .bar{height:6px;background:rgba(0,80,140,0.15);border-radius:3px;margin-top:8px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,80,140,0.2)}
  .bar-fill{height:100%;width:75%;background:linear-gradient(90deg,#00aa44,#00ff88);box-shadow:0 0 8px rgba(0,255,136,0.6)}
</style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="orb">K</div>
      <div style="flex:1">
        <div class="name">DR. K</div>
        <div class="status"><div class="live-dot"></div>online · session 1</div>
      </div>
    </div>
    <div class="section">▸ Section 05 · The State of You</div>
    <h1 class="question">Let's talk about Sundays.</h1>
    <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
    <div class="options">
      <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
      <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
      <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta"><span>Q 15 / 20</span><span>75% complete</span></div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
  </div>
</body>
</html>
