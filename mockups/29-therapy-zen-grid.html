<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Zen 2x2 Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Manrope',sans-serif;background:#0f1b2d;color:#f0ebe0;min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;padding:24px 20px;overflow:hidden;position:relative;max-width:440px;margin:0 auto}
  body::before{content:'';position:absolute;top:25%;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,180,120,0.18) 0%,transparent 70%);animation:breathe 8s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateX(-50%) scale(0.9);opacity:0.6}50%{transform:translateX(-50%) scale(1.1);opacity:1}}
  .top{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,235,224,0.4);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;font-weight:500}
  .question-center{text-align:center;position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0}
  .from{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:14px;color:rgba(255,180,120,0.7);margin-bottom:24px;letter-spacing:1px}
  .question{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:42px;line-height:1.05;letter-spacing:-1px;margin:0 0 20px;color:#fff}
  .question .em{font-style:italic;color:rgba(255,180,120,0.95)}
  .followup{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:18px;line-height:1.45;color:rgba(240,235,224,0.65);max-width:300px;margin:0 auto}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1}
  .option{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:18px 14px;font:inherit;color:#f0ebe0;cursor:pointer;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;aspect-ratio:1;justify-content:center;transition:all .3s}
  .option:hover{background:rgba(255,180,120,0.1);border-color:rgba(255,180,120,0.4);transform:scale(1.03)}
  .emoji{font-size:36px;line-height:1}
  .opt-text{font-size:12.5px;line-height:1.3;color:rgba(240,235,224,0.9);font-weight:400}
  .bottom-strip{display:flex;justify-content:center;gap:6px;position:relative;z-index:1;padding-top:18px}
  .pd{width:6px;height:6px;border-radius:50%;background:rgba(240,235,224,0.2)}
  .pd.on{background:rgba(255,180,120,0.95);box-shadow:0 0 6px rgba(255,180,120,0.5)}
</style>
</head>
<body>
  <div class="top">
    <span>● Dr. K</span>
    <span>15 / 20</span>
  </div>
  <div class="question-center">
    <div class="from">— a question, gently —</div>
    <h1 class="question">Let's talk about<br><span class="em">Sundays.</span></h1>
    <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
  </div>
  <div>
    <div class="options-grid">
      <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about the calendar</span></button>
      <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, just Monday</span></button>
      <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="bottom-strip">
      <span class="pd on"></span><span class="pd on"></span><span class="pd on"></span><span class="pd on"></span><span class="pd on"></span><span class="pd"></span>
    </div>
  </div>
</body>
</html>
