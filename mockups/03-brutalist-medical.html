<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Brutalist Medical</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f4f1ea;--ink:#0a0a0a;--red:#c0392b}
  *{box-sizing:border-box}
  body{margin:0;font-family:'IBM Plex Mono',monospace;background:#d9d2bf;color:var(--ink);display:flex;justify-content:center;min-height:100vh;padding:16px}
  .form{width:100%;max-width:440px;background:var(--paper);border:3px solid var(--ink);display:flex;flex-direction:column;min-height:calc(100vh - 32px)}
  .form-header{border-bottom:3px solid var(--ink);padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;background:#fff}
  .form-id{font-size:11px;font-weight:700;line-height:1.4}
  .form-id .small{font-weight:400;font-size:10px}
  .stamp{border:2px solid var(--red);color:var(--red);padding:5px 10px;font-size:10px;font-weight:700;letter-spacing:1px;transform:rotate(-4deg);background:var(--paper)}
  .meta{border-bottom:1px solid var(--ink);padding:10px 16px;display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:1px}
  .section-label{background:var(--ink);color:var(--paper);padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:2.5px}
  .body{padding:24px 16px;flex:1}
  .item-number{font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
  .question{font-size:19px;font-weight:500;line-height:1.35;margin-bottom:28px}
  .question .line2{font-weight:400;display:block;margin-top:6px}
  .instruction{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;color:#666;border-top:1px dashed #999;padding-top:12px}
  .options{display:flex;flex-direction:column}
  .option{border:1.5px solid var(--ink);background:var(--paper);padding:13px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:-1.5px;color:var(--ink);transition:all .12s}
  .option:hover{background:var(--ink);color:var(--paper)}
  .option:hover .checkbox{background:var(--paper)}
  .checkbox{width:14px;height:14px;border:1.5px solid currentColor;flex-shrink:0;transition:all .12s}
  .footer{border-top:3px solid var(--ink);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:1px;background:#fff}
  .pages{font-weight:700}
  .progress-block{display:flex;gap:3px;align-items:center}
  .pip{width:9px;height:9px;background:var(--ink)}
  .pip.empty{background:transparent;border:1px solid var(--ink)}
</style>
</head>
<body>
  <div class="form">
    <div class="form-header">
      <div class="form-id">FORM SQ-26<br><span class="small">CAREER ASSESSMENT</span></div>
      <div class="stamp">CONFIDENTIAL</div>
    </div>
    <div class="meta">
      <span>PATIENT ID: usr_xk29q</span>
      <span>16 MAY 2026</span>
    </div>
    <div class="section-label">SEC. 5 · THE STATE OF YOU</div>
    <div class="body">
      <div class="item-number">ITEM 15</div>
      <div class="question">Let's talk about Sundays.<span class="line2">How does your body feel when you remember it's Monday tomorrow?</span></div>
      <div class="instruction">Select one. All responses confidential.</div>
      <div class="options">
        <button class="option"><div class="checkbox"></div><span>🌞 Excited about something on the calendar</span></button>
        <button class="option"><div class="checkbox"></div><span>😐 Neutral, it's just Monday</span></button>
        <button class="option"><div class="checkbox"></div><span>😔 Heavy chest, dread</span></button>
        <button class="option"><div class="checkbox"></div><span>🪦 Already pre-tired</span></button>
      </div>
    </div>
    <div class="footer">
      <span class="pages">ITEM 15 OF 20</span>
      <div class="progress-block">
        <span class="pip"></span><span class="pip"></span><span class="pip"></span>
        <span class="pip"></span><span class="pip"></span><span class="pip empty"></span>
      </div>
    </div>
  </div>
</body>
</html>
