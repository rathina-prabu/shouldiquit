<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Therapist Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#f4ece0;--warm:#e8d9c0;--ink:#3a2a1e;--accent:#8b6f4e;--soft:#d4c4a8}
  *{box-sizing:border-box}
  body{margin:0;font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#f4ece0 0%,#e8d4b3 100%);color:var(--ink);min-height:100vh;display:flex;justify-content:center}
  .room{width:100%;max-width:440px;min-height:100vh;padding:24px 26px 32px;display:flex;flex-direction:column;position:relative}
  .room::before{content:'🌿';position:absolute;top:32px;right:24px;font-size:36px;opacity:0.7;filter:saturate(0.7)}
  .room::after{content:'';position:absolute;top:0;left:0;right:0;height:160px;background:radial-gradient(ellipse at 80% 100%,rgba(255,200,140,0.4) 0%,transparent 65%);pointer-events:none}
  .session-header{margin-bottom:30px;position:relative;z-index:1}
  .clinic-name{font-family:'Vollkorn',serif;font-size:13px;letter-spacing:0.5px;color:var(--accent);font-weight:500;font-style:italic;margin-bottom:2px}
  .doctor-name{font-family:'Vollkorn',serif;font-size:24px;font-weight:500;letter-spacing:-0.3px;margin:0;line-height:1}
  .doctor-title{font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:500}
  .session-meta{margin-top:20px;padding:10px 14px;background:rgba(232,217,192,0.5);border-left:3px solid var(--accent);font-size:11.5px;color:#5a4a3a;display:flex;justify-content:space-between}
  .session-meta strong{color:var(--ink);font-weight:500}
  .topic-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .topic-label::before{content:'';flex:0 0 30px;height:1px;background:var(--accent)}
  .dr-speaks{font-family:'Vollkorn',serif;font-style:italic;font-size:15px;color:var(--accent);margin-bottom:6px}
  .question{font-family:'Vollkorn',serif;font-weight:400;font-size:26px;line-height:1.3;margin:0 0 12px;color:var(--ink)}
  .openquote{font-family:'Vollkorn',serif;font-size:48px;line-height:0;position:relative;top:14px;color:var(--accent);margin-right:2px}
  .followup{font-family:'Vollkorn',serif;font-size:17px;line-height:1.45;color:#5a4a3a;margin-bottom:40px;font-style:italic}
  .response-prompt{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:500}
  .options{display:flex;flex-direction:column;gap:8px}
  .option{background:rgba(255,250,243,0.75);border:1px solid var(--soft);padding:14px 16px;font:inherit;font-size:15px;color:var(--ink);text-align:left;display:flex;align-items:center;gap:14px;cursor:pointer;border-radius:2px;transition:all .2s}
  .option:hover{background:#fff8ec;border-color:var(--accent);box-shadow:0 2px 8px rgba(139,111,78,0.15)}
  .emoji{font-size:20px}
  .opt-text{flex:1}
  .bottom{margin-top:32px;padding-top:16px;border-top:1px solid var(--soft);display:flex;justify-content:space-between;font-size:12px;color:var(--accent);font-style:italic}
  .lamp{position:absolute;bottom:30px;left:24px;font-size:24px;opacity:0.4}
</style>
</head>
<body>
  <div class="room">
    <div class="session-header">
      <div class="clinic-name">Independent Practice</div>
      <h1 class="doctor-name">Dr. K</h1>
      <div class="doctor-title">— Career Therapist —</div>
      <div class="session-meta">
        <span>Session <strong>1 of 1</strong></span>
        <span>00:08 elapsed</span>
        <span>16 May '26</span>
      </div>
    </div>
    <div class="topic-label">The State of You</div>
    <div class="dr-speaks">Dr. K asks, softly:</div>
    <h2 class="question"><span class="openquote">"</span>Let's talk about Sundays.</h2>
    <p class="followup">How does your body feel when you remember it's Monday tomorrow?"</p>
    <div class="response-prompt">— Take your time. Pick one. —</div>
    <div class="options">
      <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
      <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
      <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="bottom">
      <span>Q 15 of 20</span>
      <span>5 left</span>
    </div>
    <div class="lamp">🪔</div>
  </div>
</body>
</html>
