<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Swiss</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  body{margin:0;font-family:'Archivo',sans-serif;background:#fafaf7;color:#0a0a0a;min-height:100vh;display:flex;justify-content:center}
  .grid{width:100%;max-width:440px;padding:32px 24px;display:flex;flex-direction:column;min-height:100vh}
  .top-bar{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1.5px solid #0a0a0a;padding-bottom:6px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .top-bar .brand{font-weight:900;font-size:14px;letter-spacing:0;text-transform:none}
  .section-bar{background:#0a0a0a;color:#fafaf7;padding:7px 0;display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:36px}
  .section-bar span{padding:0 12px}
  .question-wrap{margin-top:52px}
  .item-num{font-size:14px;font-weight:900;margin-bottom:4px;color:#ff3838}
  .question{font-family:'Archivo',sans-serif;font-weight:900;font-size:46px;line-height:0.95;letter-spacing:-2.2px;margin:0 0 20px}
  .followup{font-size:16px;line-height:1.4;font-weight:400;margin-bottom:0;color:#444}
  .options{display:flex;flex-direction:column;margin-top:56px;border-top:1.5px solid #0a0a0a}
  .option{background:transparent;border:0;border-bottom:1.5px solid #0a0a0a;padding:18px 0;font:inherit;font-size:17px;font-weight:500;text-align:left;display:flex;align-items:center;gap:18px;cursor:pointer;color:#0a0a0a;transition:all .15s}
  .option:hover{background:#ff3838;color:#fff;padding-left:12px}
  .option:hover .num{color:#fff}
  .num{font-weight:900;width:28px;font-size:14px;color:#ff3838;transition:color .15s}
  .opt-text{flex:1}
  .emoji{font-size:20px}
  .bottom{margin-top:auto;padding-top:32px;display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .bottom .progress{display:flex;align-items:center;gap:10px}
  .bar{width:80px;height:3px;background:#e5e5e5}
  .bar-fill{height:100%;width:75%;background:#ff3838}
</style>
</head>
<body>
  <div class="grid">
    <div class="top-bar">
      <span>16.05.26</span>
      <span class="brand">Dr. K</span>
      <span>Session 1/1</span>
    </div>
    <div class="section-bar">
      <span>Section 05</span><span>The State of You</span>
    </div>
    <div class="question-wrap">
      <div class="item-num">15</div>
      <h1 class="question">Let's talk about Sundays.</h1>
      <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
    </div>
    <div class="options">
      <button class="option"><span class="num">01</span><span class="emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
      <button class="option"><span class="num">02</span><span class="emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
      <button class="option"><span class="num">03</span><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
      <button class="option"><span class="num">04</span><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
    </div>
    <div class="bottom">
      <span>Anonymous · Confidential</span>
      <div class="progress"><span>15/20</span><div class="bar"><div class="bar-fill"></div></div></div>
    </div>
  </div>
</body>
</html>
