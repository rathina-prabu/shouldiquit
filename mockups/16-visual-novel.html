<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Visual Novel</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Zen Maru Gothic',sans-serif;background:#0c0a18;min-height:100vh;display:flex;justify-content:center;color:#fff}
  .screen{width:100%;max-width:440px;background:linear-gradient(180deg,#3a2a4a 0%,#1a1530 60%,#0c0a18 100%);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:48px 16px 8px;position:relative;min-height:300px}
  .sparkle{position:absolute;color:#fff;font-size:14px;opacity:0.4;animation:twinkle 3s infinite}
  .sparkle:nth-child(1){top:60px;left:30px}
  .sparkle:nth-child(2){top:120px;right:50px;animation-delay:1s}
  .sparkle:nth-child(3){top:200px;left:60px;animation-delay:2s}
  .sparkle:nth-child(4){top:80px;right:30px;animation-delay:1.5s}
  @keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
  .character{font-size:140px;line-height:1;filter:drop-shadow(0 0 40px rgba(255,182,193,0.5))}
  .character-glow{position:absolute;bottom:80px;width:240px;height:140px;background:radial-gradient(ellipse,rgba(255,182,193,0.3) 0%,transparent 70%);pointer-events:none}
  .progress-top{position:absolute;top:14px;left:16px;right:16px;display:flex;justify-content:space-between;font-family:'DotGothic16',monospace;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.6);text-transform:uppercase}
  .dialog-box{background:rgba(10,5,30,0.92);backdrop-filter:blur(10px);border:2px solid #ff6ec7;border-radius:16px 16px 0 0;padding:18px 20px 24px;box-shadow:0 -4px 24px rgba(255,110,199,0.3)}
  .nameplate{display:inline-block;background:linear-gradient(90deg,#ff6ec7,#ffb6c1);color:#0c0a18;padding:4px 18px;font-family:'DotGothic16',monospace;font-weight:700;font-size:13px;letter-spacing:1.5px;margin-top:-30px;margin-bottom:12px;border:2px solid #fff;text-transform:uppercase}
  .section-label{font-family:'DotGothic16',monospace;font-size:10px;color:#ff6ec7;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
  .question{font-size:20px;font-weight:700;line-height:1.3;margin:0 0 6px}
  .arrow{display:inline-block;color:#ff6ec7;animation:bounce 1s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  .followup{font-size:14px;line-height:1.5;color:rgba(255,255,255,0.85);margin-bottom:14px}
  .options{display:flex;flex-direction:column;gap:6px}
  .option{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,110,199,0.4);border-radius:8px;padding:10px 14px;font:inherit;font-size:13px;color:#fff;text-align:left;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
  .option:hover{background:rgba(255,110,199,0.2);border-color:#ff6ec7;transform:translateX(2px)}
  .option:hover::before{content:'▸';color:#ff6ec7;font-weight:700;margin-right:-4px}
  .emoji{font-size:18px}
  .opt-text{flex:1}
</style>
</head>
<body>
  <div class="screen">
    <div class="stage">
      <div class="progress-top"><span>★ SESSION 1</span><span>15/20</span></div>
      <div class="sparkle">✦</div><div class="sparkle">✧</div><div class="sparkle">✦</div><div class="sparkle">✧</div>
      <div class="character-glow"></div>
      <div class="character">🧑‍⚕️</div>
    </div>
    <div class="dialog-box">
      <span class="nameplate">Dr. K</span>
      <div class="section-label">— Section V: The State of You —</div>
      <h1 class="question">Let's talk about Sundays.<span class="arrow"> ▼</span></h1>
      <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
      <div class="options">
        <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
        <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
        <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
        <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
      </div>
    </div>
  </div>
</body>
</html>
