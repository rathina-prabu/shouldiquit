<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Should I Quit · Indian Textile</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Eczar:wght@400;500;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f9e4b7;--maroon:#6b0f1a;--gold:#c9a227;--teal:#0a716a;--ink:#2a0d10}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Karla',sans-serif;background:#3a0a10;background-image:radial-gradient(circle at 50% 50%,#5a1018 0%,#3a0a10 70%);color:var(--ink);display:flex;justify-content:center;min-height:100vh;padding:20px}
  .container{width:100%;max-width:440px;background:var(--bg);border:6px solid var(--maroon);position:relative;display:flex;flex-direction:column}
  .container::before,.container::after{content:'';position:absolute;height:8px;left:-6px;right:-6px;background:repeating-linear-gradient(90deg,var(--maroon) 0 8px,var(--gold) 8px 16px,var(--teal) 16px 24px,var(--gold) 24px 32px)}
  .container::before{top:-14px}
  .container::after{bottom:-14px}
  .inner{padding:24px 22px}
  .header{text-align:center;padding:8px 0 12px;border-bottom:2px double var(--maroon);margin-bottom:24px}
  .header-title{font-family:'Yatra One',cursive;font-size:28px;color:var(--maroon);margin-bottom:4px;letter-spacing:0.5px}
  .header-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);font-weight:700}
  .section-badge{display:inline-block;background:var(--maroon);color:var(--bg);padding:4px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .question{font-family:'Eczar',serif;font-weight:700;font-size:28px;line-height:1.15;color:var(--maroon);margin:0 0 10px}
  .followup{font-family:'Eczar',serif;font-weight:400;font-style:italic;font-size:16px;line-height:1.4;color:var(--ink);margin-bottom:24px;padding-bottom:18px;border-bottom:1px dotted var(--maroon)}
  .options{display:flex;flex-direction:column;gap:11px}
  .option{background:#fff8eb;border:2px solid var(--maroon);box-shadow:4px 4px 0 var(--gold);padding:14px 16px;font:inherit;font-size:14px;text-align:left;display:flex;align-items:center;gap:12px;color:var(--ink);cursor:pointer;font-weight:500;transition:all .15s}
  .option:hover{background:var(--gold);box-shadow:4px 4px 0 var(--maroon);transform:translate(-2px,-2px)}
  .emoji{font-size:22px}
  .opt-text{flex:1}
  .footer{text-align:center;padding-top:20px;border-top:2px double var(--maroon);margin-top:24px;font-size:11px;color:var(--teal);font-weight:700;letter-spacing:2px;display:flex;justify-content:center;align-items:center;gap:12px}
  .progress-dots{display:inline-flex;gap:5px;align-items:center}
  .pdot{width:9px;height:9px;background:var(--maroon);transform:rotate(45deg)}
  .pdot.empty{background:transparent;border:1.5px solid var(--maroon)}
</style>
</head>
<body>
  <div class="container">
    <div class="inner">
      <div class="header">
        <div class="header-title">श्री Dr. K</div>
        <div class="header-sub">Career Consultation · One Session</div>
      </div>
      <span class="section-badge">Section V · State of You</span>
      <h1 class="question">Let's talk about Sundays.</h1>
      <p class="followup">How does your body feel when you remember it's Monday tomorrow?</p>
      <div class="options">
        <button class="option"><span class="emoji">🌞</span><span class="opt-text">Excited about something on the calendar</span></button>
        <button class="option"><span class="emoji">😐</span><span class="opt-text">Neutral, it's just Monday</span></button>
        <button class="option"><span class="emoji">😔</span><span class="opt-text">Heavy chest, dread</span></button>
        <button class="option"><span class="emoji">🪦</span><span class="opt-text">Already pre-tired</span></button>
      </div>
      <div class="footer">
        <span>15 / 20</span>
        <span class="progress-dots">
          <span class="pdot"></span><span class="pdot"></span><span class="pdot"></span>
          <span class="pdot"></span><span class="pdot"></span><span class="pdot empty"></span>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
