<!DOCTYPE html>

<head>

<title>Should I Quit · Share Card</title>

<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Rubik',sans-serif;background:#1a0e20;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px 20px 80px;color:#f4ecd6}
  .container{display:flex;flex-direction:column;align-items:center;gap:12px}
  .label{font-size:11px;letter-spacing:0.2em;color:rgba(244,236,214,0.6);text-transform:uppercase}
  .card{width:min(440px, 100vw - 40px);aspect-ratio:1/1;background:#f4ecd6;background-image:radial-gradient(circle,rgba(14,56,112,0.04) 1px,transparent 1px);background-size:4px 4px;border:2px solid #0e3870;padding:32px 30px;display:flex;flex-direction:column;justify-content:space-between;color:#0e3870}

  .verdict-stack{text-align:center;margin:auto 0}
  .label-line{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:#e8576b;margin-bottom:18px;font-weight:500}

  .score .of{font-size:24px;color:#e8576b;letter-spacing:0;margin-left:4px}
  .weakest{margin-top:18px;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(14,56,112,0.7);font-weight:500}
  .weakest strong{color:#e8576b}
  .quote{margin-top:10px;font-style:italic;font-size:14px;line-height:1.45;padding:0 16px;color:#0e3870}
  .card-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid rgba(14,56,112,0.2);font-size:12px;letter-spacing:0.05em;color:rgba(14,56,112,0.7)}
  .url .accent{color:#e8576b;font-weight:500}
  .sig{font-family:'Rubik Mono One',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#0e3870}
  .dim{font-size:11px;letter-spacing:0.18em;color:rgba(244,236,214,0.45);text-transform:uppercase;margin-top:6px;text-align:center;line-height:1.5;max-width:300px}
  .next-link{position:fixed;bottom:14px;right:14px;background:#e8576b;color:#f4ecd6;padding:6px 12px;font-size:11px;letter-spacing:0.1em;text-decoration:none;text-transform:uppercase}
  .prev-link{position:fixed;bottom:14px;left:14px;background:transparent;color:#f4ecd6;border:1px solid rgba(244,236,214,0.4);padding:5px 12px;font-size:11px;letter-spacing:0.1em;text-decoration:none;text-transform:uppercase}

<body>
  <div class="container">
    <div class="label">— Share card · 1:1 —</div>
    <div class="card">
      <div class="card-top">
        <span>shouldiquit.app</span>
        <span class="stamp">Anonymous</span>
      </div>
      <div class="verdict-stack">
        <div class="label-line">— Final Recommendation —</div>

      </div>
    </div>
    <div class="dim">1080 × 1080 · WhatsApp / IG Story / Save to camera roll</div>
  </div>
  <a href="07-result.html" class="prev-link">← back</a>
